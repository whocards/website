[build.environment]
  NODE_VERSION = "22"

[build]
  command = "pnpm build"
  publish = "dist"

# #43: old per-question urls now live on the generalized play screen.
# Redirect /<lang>/question/<id> -> /<lang>/play?q=<id> with a real 301 so
# previously shared & indexed links keep working.
[[redirects]]
  from = "/:language/question/:id"
  to = "/:language/play?q=:id"
  status = 301
  force = true

