name: E2E

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # `--ignore-scripts` skips sharp's postinstall build step, which tries to
      # build libvips from source and fails without node-gyp. The prebuilt
      # platform binary (@img/sharp-*) is installed from the lockfile and is what
      # Astro actually uses at build time, so the site still builds correctly.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Get Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Build the static site explicitly so a build failure is its own step.
      # The Playwright config's webServer also runs `pnpm build`, but with the
      # output already present that is fast/idempotent.
      - name: Build site
        run: pnpm build

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
